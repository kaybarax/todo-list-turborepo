name: Full CI

on:
  push:
    branches: [main]
  schedule:
    - cron: '23 3 * * *'
  workflow_dispatch:

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_REMOTE_ONLY: true

jobs:
  quality:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: password
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
    steps:
      - name: Bootstrap local actions
        uses: actions/checkout@v4

      - name: Setup repository
        uses: ./.github/actions/setup-pnpm-node
        with:
          fetch-depth: '0'

      - name: Lint
        run: pnpm turbo run lint --continue

      - name: Typecheck
        run: pnpm turbo run typecheck --continue

      - name: Test
        run: pnpm turbo run test --continue
        env:
          MONGODB_URI: mongodb://root:password@localhost:27017/todos_test?authSource=admin
          REDIS_URI: redis://localhost:6379

      - name: Build
        run: pnpm turbo run build --continue

      - name: OpenAPI Parity Check
        run: |
          pnpm --filter @todo/api-bun openapi:export
          # We don't fail the CI on non-breaking differences, but we want to see the report
          pnpm --filter @todo/api-bun openapi:compare || echo "⚠️ OpenAPI differences detected. Review artifacts."
        env:
          NODE_ENV: test

      - name: Upload OpenAPI Spec
        uses: actions/upload-artifact@v7
        with:
          name: bun-api-openapi-spec
          path: docs/BUN_ELYSIA_API_CURRENT_OPENAPI.json

      - name: Upload Turbo summary
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: full-ci-turbo-summary
          path: .turbo/runs/*.json
          if-no-files-found: ignore
