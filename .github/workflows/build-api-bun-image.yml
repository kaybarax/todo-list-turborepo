name: Build API Bun Docker Image

on:
  push:
    branches: [main, develop]
    paths:
      - apps/api-bun/**
      - packages/services/**
      - packages/utils/**
      - pnpm-lock.yaml
      - package.json
      - Dockerfile
      - .github/actions/setup-pnpm-node/**
      - .github/workflows/build-api-bun-image.yml
  workflow_dispatch:
    inputs:
      push_image:
        description: Push image to ECR (true/false)
        required: true
        default: true
        type: boolean

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_REMOTE_ONLY: true
  AWS_REGION: ${{ vars.AWS_REGION }}
  API_BUN_ECR_REPOSITORY_URL: ${{ vars.API_BUN_ECR_REPOSITORY_URL }}

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build API Bun Image
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.image.outputs.uri }}
      image_digest: ${{ steps.build-image.outputs.digest }}
      tags: ${{ steps.image-tags.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup repository
        uses: ./.github/actions/setup-pnpm-node

      - name: Validate and build API Bun
        run: pnpm turbo run lint typecheck test build --filter=@todo/api-bun...

      - name: Configure AWS credentials
        if: github.event_name == 'push' || github.event.inputs.push_image == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        if: github.event_name == 'push' || github.event.inputs.push_image == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Prepare image tags
        id: image-tags
        run: |
          short_sha="${GITHUB_SHA::12}"
          branch_name="${GITHUB_REF#refs/heads/}"
          {
            echo "tags<<EOF"
            echo "${API_BUN_ECR_REPOSITORY_URL}:${GITHUB_SHA}"
            echo "${API_BUN_ECR_REPOSITORY_URL}:${branch_name}-${short_sha}"
            echo "${API_BUN_ECR_REPOSITORY_URL}:${branch_name}-latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        id: build-image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api-bun/Dockerfile
          push: ${{ github.event_name == 'push' || github.event.inputs.push_image == 'true' }}
          tags: ${{ steps.image-tags.outputs.tags }}
          cache-from: type=registry,ref=${{ env.API_BUN_ECR_REPOSITORY_URL }}:buildcache
          cache-to: type=registry,ref=${{ env.API_BUN_ECR_REPOSITORY_URL }}:buildcache,mode=max
          provenance: false

      - name: Export image URI
        id: image
        run: echo "uri=${API_BUN_ECR_REPOSITORY_URL}@${{ steps.build-image.outputs.digest }}" >> "$GITHUB_OUTPUT"

      - name: Create build summary
        run: |
          cat << 'EOF'
          ## API Bun Docker Image Build
          - **Image Digest**: `${{ steps.build-image.outputs.digest }}`
          - **Git SHA**: `${{ github.sha }}`
          - **Branch**: `${{ github.ref }}`
          - **Tags**:
            - `${API_BUN_ECR_REPOSITORY_URL}:${GITHUB_SHA}`
            - `${API_BUN_ECR_REPOSITORY_URL}:${GITHUB_REF#refs/heads/}-${GITHUB_SHA::12}`
          EOF

      - name: Upload build metadata
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: api-bun-image-metadata
          path: |
            .turbo/runs/*.json
          if-no-files-found: ignore
          retention-days: 30
