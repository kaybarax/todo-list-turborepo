name: Affected CI

on:
  pull_request:
    branches: [main]

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_REMOTE_ONLY: true

jobs:
  affected:
    name: Affected Lint, Typecheck, Test
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: password
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
    steps:
      - name: Bootstrap local actions
        uses: actions/checkout@v4

      - name: Setup repository
        uses: ./.github/actions/setup-pnpm-node
        with:
          fetch-depth: '0'

      - name: Run affected tasks
        run: pnpm turbo run lint typecheck test --filter=...[origin/${{ github.base_ref }}] --continue
        env:
          MONGODB_URI: mongodb://root:password@localhost:27017/todos_test?authSource=admin
          REDIS_URI: redis://localhost:6379

      - name: Upload Turbo summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: affected-ci-turbo-summary
          path: .turbo/runs/*.json
          if-no-files-found: ignore
