name: Deploy Smart Contracts (Mainnet)

on:
  workflow_dispatch:

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_REMOTE_ONLY: true

jobs:
  deploy:
    name: Deploy to Mainnet
    runs-on: ubuntu-latest
    environment: mainnet
    concurrency:
      group: deploy-contracts-mainnet
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup repository
        uses: ./.github/actions/setup-pnpm-node

      - name: Install blockchain dependencies
        run: pnpm --filter @todo/smart-contracts deps:check || pnpm --filter @todo/smart-contracts deps:fix

      - name: Compile Contracts
        run: pnpm turbo run compile --filter=@todo/smart-contracts

      - name: Test Contracts
        run: pnpm turbo run test --filter=@todo/smart-contracts

      - name: Deploy to Mainnets
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          POLYGON_RPC_URL: ${{ secrets.POLYGON_RPC_URL }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          MOONBEAM_RPC_URL: ${{ secrets.MOONBEAM_RPC_URL }}
        run: |
          pnpm --filter @todo/smart-contracts deploy:polygon:mainnet
          pnpm --filter @todo/smart-contracts deploy:moonbeam:mainnet
          pnpm --filter @todo/smart-contracts deploy:base:mainnet
          pnpm --filter @todo/smart-contracts deploy:solana:mainnet

      - name: Upload Contract Addresses Artifact
        uses: actions/upload-artifact@v4
        with:
          name: contract-addresses-mainnet
          path: apps/smart-contracts/**/deployments/**/*.json
          if-no-files-found: ignore
