name: Deploy Web to Vercel

on:
  push:
    branches: [main]
    paths:
      - apps/web/**
      - packages/ui-web/**
      - packages/services/**
      - packages/utils/**
      - pnpm-lock.yaml
      - package.json
      - turbo.json
      - .github/actions/setup-pnpm-node/**
      - .github/workflows/deploy-web-vercel.yml
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment.
        required: true
        default: production
        type: choice
        options:
          - dev
          - staging
          - production
      image_tag:
        description: Optional release tag to record in deployment metadata.
        required: false
        type: string
      skip_tests:
        description: Emergency use only. Skips predeploy validation.
        required: true
        default: false
        type: boolean

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_REMOTE_ONLY: true
  VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Deploy Web
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    concurrency:
      group: deploy-web-${{ github.event.inputs.environment || 'production' }}
      cancel-in-progress: false
    steps:
      - name: Bootstrap local actions
        uses: actions/checkout@v4

      - name: Setup repository
        uses: ./.github/actions/setup-pnpm-node

      - name: Validate web
        if: ${{ github.event.inputs.skip_tests != 'true' }}
        run: pnpm --filter @todo/web typecheck

      - name: Select Vercel target
        id: target
        run: |
          environment="${{ github.event.inputs.environment || 'production' }}"
          if [ "$environment" = "production" ]; then
            echo "build_args=--prod" >> "$GITHUB_OUTPUT"
            echo "deploy_args=--prod" >> "$GITHUB_OUTPUT"
            echo "vercel_environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "build_args=" >> "$GITHUB_OUTPUT"
            echo "deploy_args=" >> "$GITHUB_OUTPUT"
            echo "vercel_environment=preview" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull Vercel environment
        run: pnpm dlx vercel pull --yes --environment=${{ steps.target.outputs.vercel_environment }} --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web

      - name: Build with Vercel
        run: pnpm dlx vercel build ${{ steps.target.outputs.build_args }} --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web

      - name: Deploy to Vercel
        id: deploy
        run: |
          deployment_url="$(pnpm dlx vercel deploy --prebuilt ${{ steps.target.outputs.deploy_args }} --token=${{ secrets.VERCEL_TOKEN }})"
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
        working-directory: apps/web

      - name: Smoke test deployment
        if: ${{ github.event.inputs.skip_tests != 'true' }}
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.deploy.outputs.deployment_url }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
        run: pnpm --filter @todo/web test:e2e:smoke --project=chromium

      - name: Write build metadata
        if: always()
        run: |
          mkdir -p deployment-metadata
          jq -n \
            --arg service web \
            --arg environment "${{ github.event.inputs.environment || 'production' }}" \
            --arg git_sha "$GITHUB_SHA" \
            --arg release_tag "${{ github.event.inputs.image_tag }}" \
            --arg deployment_url "${{ steps.deploy.outputs.deployment_url }}" \
            '{service: $service, environment: $environment, git_sha: $git_sha, release_tag: $release_tag, deployment_url: $deployment_url}' \
            > deployment-metadata/web.json

      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deploy-web-metadata
          path: |
            deployment-metadata/web.json
            .turbo/runs/*.json
          if-no-files-found: ignore
