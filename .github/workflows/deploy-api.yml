name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/services/**'
      - '.github/workflows/deploy-api.yml'

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_REMOTE_ONLY: true
  AWS_REGION: ${{ vars.AWS_REGION }}
  API_ECR_REPOSITORY_URL: ${{ vars.API_ECR_REPOSITORY_URL }}
  API_ECS_CLUSTER: ${{ vars.API_ECS_CLUSTER }}
  API_ECS_SERVICE: ${{ vars.API_ECS_SERVICE }}
  API_ECS_CONTAINER_NAME: ${{ vars.API_ECS_CONTAINER_NAME || 'todo-api' }}

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build --filter=@todo/api...

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build-image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_ECR_REPOSITORY_URL }}:${{ github.sha }}
            ${{ env.API_ECR_REPOSITORY_URL }}:latest
          cache-from: type=registry,ref=${{ env.API_ECR_REPOSITORY_URL }}:buildcache
          cache-to: type=registry,ref=${{ env.API_ECR_REPOSITORY_URL }}:buildcache,mode=max
          provenance: false

      - name: Export image URI
        run: |
          echo "image=${API_ECR_REPOSITORY_URL}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
        id: image

      - name: Download current ECS task definition
        run: |
          task_definition_arn="$(aws ecs describe-services --cluster "$API_ECS_CLUSTER" --services "$API_ECS_SERVICE" --query 'services[0].taskDefinition' --output text)"
          aws ecs describe-task-definition --task-definition "$task_definition_arn" --query 'taskDefinition' > task-definition.json
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' task-definition.json > task-definition-renderable.json

      - name: Render ECS task definition
        id: render-task-definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition-renderable.json
          container-name: ${{ env.API_ECS_CONTAINER_NAME }}
          image: ${{ steps.image.outputs.image }}

      - name: Deploy to AWS ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-definition.outputs.task-definition }}
          service: ${{ env.API_ECS_SERVICE }}
          cluster: ${{ env.API_ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Notify deployment status
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: deployments
          SLACK_COLOR: ${{ job.status }}
          SLACK_TITLE: API Deployment
          SLACK_MESSAGE: ${{ job.status == 'success' && 'API deployed successfully! :rocket:' || 'API deployment failed! :x:' }}
          SLACK_FOOTER: 'GitHub Actions'
