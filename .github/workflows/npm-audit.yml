name: PNPM Audit Fix

on:
  schedule:
    - cron: '0 0 * * *' # Run every day at midnight
  workflow_dispatch: # Allow manual triggering

jobs:
  audit-fix:
    name: Run pnpm audit fix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit fix
        run: pnpm audit --fix || true

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.git-check.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'fix: security vulnerabilities from pnpm audit fix'
          title: 'fix: security vulnerabilities from pnpm audit fix'
          body: |
            This PR fixes security vulnerabilities in dependencies using `pnpm audit --fix`.

            Changes were made automatically by the pnpm-audit-fix GitHub Action.
          branch: pnpm-audit-fix
          base: main
          labels: security,dependencies
          delete-branch: true
