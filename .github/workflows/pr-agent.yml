name: PR Agent Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize, review_requested]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: pr-agent-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  pr-agent:
    name: Local review agent
    if: |
      vars.PR_AGENT_LOCAL_OLLAMA_ENABLED == 'true' &&
      github.event.sender.type != 'Bot' &&
      (
        github.event_name == 'pull_request' ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request != null &&
          startsWith(github.event.comment.body, '/')
        )
      )
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - name: Check local Ollama
        run: |
          curl --fail --silent http://localhost:11434/api/tags >/dev/null
          ollama list | grep -F "qwen2.5-coder:32b"

      - name: Run PR-Agent
        uses: qodo-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          config.model: "ollama/qwen2.5-coder:32b"
          config.fallback_models: '["ollama/qwen2.5-coder:32b"]'
          config.custom_model_max_tokens: "32768"
          config.duplicate_examples: "true"
          OLLAMA.API_BASE: "http://localhost:11434"
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "true"
          github_action_config.pr_actions: '["opened", "reopened", "ready_for_review", "synchronize", "review_requested"]'
