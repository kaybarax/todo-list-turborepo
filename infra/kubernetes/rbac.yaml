apiVersion: v1
kind: ServiceAccount
metadata:
  name: todo-app-service-account
  namespace: todo-app
  labels:
    app.kubernetes.io/name: todo-app
    app.kubernetes.io/component: service-account
    app.kubernetes.io/part-of: todo-monorepo
automountServiceAccountToken: false

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: todo-app-role
  namespace: todo-app
  labels:
    app.kubernetes.io/name: todo-app
    app.kubernetes.io/component: rbac
    app.kubernetes.io/part-of: todo-monorepo
rules:
  # Allow reading ConfigMaps and Secrets
  - apiGroups: ['']
    resources: ['configmaps', 'secrets']
    verbs: ['get', 'list', 'watch']

  # Allow reading Services for service discovery
  - apiGroups: ['']
    resources: ['services']
    verbs: ['get', 'list', 'watch']

  # Allow reading Pods for health checks
  - apiGroups: ['']
    resources: ['pods']
    verbs: ['get', 'list', 'watch']

  # Allow creating Events for logging
  - apiGroups: ['']
    resources: ['events']
    verbs: ['create', 'patch']

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: todo-app-role-binding
  namespace: todo-app
  labels:
    app.kubernetes.io/name: todo-app
    app.kubernetes.io/component: rbac
    app.kubernetes.io/part-of: todo-monorepo
subjects:
  - kind: ServiceAccount
    name: todo-app-service-account
    namespace: todo-app
roleRef:
  kind: Role
  name: todo-app-role
  apiGroup: rbac.authorization.k8s.io
