apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: todo-app-secrets
  namespace: todo-app
  labels:
    app.kubernetes.io/name: todo-app
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: todo-monorepo
spec:
  refreshInterval: '1h'
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: todo-app-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: todo-app/production/secrets

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: blockchain-secrets
  namespace: todo-app
  labels:
    app.kubernetes.io/name: todo-app
    app.kubernetes.io/component: blockchain-secrets
    app.kubernetes.io/part-of: todo-monorepo
spec:
  refreshInterval: '1h'
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: blockchain-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: todo-app/production/blockchain-secrets

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tls-secret
  namespace: todo-app
  labels:
    app.kubernetes.io/name: todo-app
    app.kubernetes.io/component: tls
    app.kubernetes.io/part-of: todo-monorepo
spec:
  refreshInterval: '24h'
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: tls-secret
    template:
      type: kubernetes.io/tls
  data:
    - secretKey: tls.crt
      remoteRef:
        key: todo-app/production/tls
        property: tls_crt
    - secretKey: tls.key
      remoteRef:
        key: todo-app/production/tls
        property: tls_key
